      html, body {

        height: 100%;

      /* Initial loading screen to prevent flash */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      #initial-loader .apple-logo {
        width: 60px;
        height: 60px;
        fill: white;
        opacity: 0.9;
        animation: pulse 2s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
